apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: counter-response
  namespace: default
spec:
  protocol: http
  request:
    method: POST
    url:
      type: exact
      pattern: /api/counter
  stubs:
    - request:
        method: POST
        url:
          type: exact
          pattern: /api/counter
      responseRules:
        - rule:
            type: range
            start: 1
            end: 3
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"message": "First three requests", "count": 1}'
        - rule:
            type: default
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"message": "Default response", "count": 4}'
      counter:
        reset: true
        resetAfter: 5