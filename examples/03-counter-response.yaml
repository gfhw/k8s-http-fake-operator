# 示例3: 计数器响应规则
# 根据请求次数返回不同的响应
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: counter-response
  namespace: default
spec:
  protocol: http
  stubs:
    - request:
        method: POST
        url:
          type: exact
          pattern: /api/counter
      responseRules:
        - rule:
            type: range
            start: 1
            end: 3
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"message": "First three requests", "phase": "initial"}'
        - rule:
            type: default
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"message": "Default response", "phase": "normal"}'
      counter:
        reset: true
        resetAfter: 5
