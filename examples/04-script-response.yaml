# 示例4: 脚本响应
# 使用外部脚本动态生成响应内容
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: script-response
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: exact
      pattern: /api/script
  response:
    type: script
    script:
      name: example-script
      type: shell
      path: /scripts/example.sh
      timeout: 10
      input:
        - "arg1"
        - "arg2"
