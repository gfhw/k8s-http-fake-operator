# 示例11: 固定延迟响应
# 模拟固定延迟，用于测试超时场景
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: delay-fixed
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: exact
      pattern: /api/delay/fixed
  response:
    type: static
    static:
      status: 200
      headers:
        Content-Type: application/json
      body: '{"message": "This response has a fixed delay of 2 seconds"}'
      delay:
        fixed: 2000  # 固定延迟 2000 毫秒（2秒）
