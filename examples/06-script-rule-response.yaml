# 示例6: 脚本规则响应
# 根据请求次数使用不同的脚本返回响应
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: script-rule-response
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: pattern
      pattern: /api/users/*/status
  response:
    type: static
    static:
      status: 200
      headers:
        Content-Type: application/json
      body: '{"user": "default", "status": "active"}'
  stubs:
    - request:
        method: GET
        url:
          type: pattern
          pattern: /api/users/*/status
      responseRules:
        - rule:
            type: range
            start: 1
            end: 3
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"user": "premium", "requests": "first-three"}'
        - rule:
            type: default
          response:
            status: 200
            headers:
              Content-Type: application/json
            body: '{"user": "regular", "requests": "default"}'
      counter:
        reset: true
        resetAfter: 10
