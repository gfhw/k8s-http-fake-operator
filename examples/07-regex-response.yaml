# 示例7: 正则表达式匹配
# 使用正则表达式匹配 URL
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: regex-response
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: regex
      regex: "^/api/v[0-9]+/users/[0-9]+$"
  response:
    type: static
    static:
      status: 200
      headers:
        Content-Type: application/json
      body: '{"message": "Regex matched", "pattern": "versioned API"}'
