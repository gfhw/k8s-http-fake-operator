# 示例16: 请求头匹配
# 根据请求头内容进行匹配
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: header-match
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: exact
      pattern: /api/secure
    headers:
      - name: Authorization
        type: contains
        value: Bearer
      - name: X-API-Version
        type: equal
        value: v1
  response:
    type: static
    static:
      status: 200
      headers:
        Content-Type: application/json
      body: '{"message": "Secure access granted", "version": "v1"}'
