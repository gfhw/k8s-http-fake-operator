# 示例5: 延迟脚本响应
# 模拟延迟响应，用于测试超时处理
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: script-delay-response
  namespace: default
spec:
  protocol: http
  request:
    method: GET
    url:
      type: exact
      pattern: /api/script-delay
  response:
    type: script
    script:
      name: delay-script
      type: shell
      path: /tmp/delay.sh
      timeout: 15
      input: []
      content: |
        #!/bin/sh
        echo '{"status": "success", "message": "Delayed response"}'
