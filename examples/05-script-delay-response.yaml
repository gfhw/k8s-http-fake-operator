# 示例5: 延迟脚本响应
# 模拟延迟响应，用于测试超时处理
apiVersion: httpteststub.example.com/v1
kind: HTTPTestStub
metadata:
  name: script-delay-response
  namespace: default
spec:
  protocol: http
  request:
    method: POST
    url:
      type: exact
      pattern: /api/delay
  response:
    type: script
    script:
      name: delay-script
      type: shell
      path: /scripts/delay.sh
      timeout: 15
      input:
        - "5"
